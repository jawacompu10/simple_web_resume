<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Resume - Really Free Resumes</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 384 512' fill='%231e40af'><path d='M64 0C28.7 0 0 28.7 0 64V448c0 35.3 28.7 64 64 64H320c35.3 0 64-28.7 64-64V160H256c-17.7 0-32-14.3-32-32V0H64zM256 0V128H384L256 0zM64 256a32 32 0 1 1 64 0 32 32 0 1 1 -64 0zm152 32c13.3 0 32-10.7 32-24s-18.7-24-32-24H160c-13.3 0-32 10.7-32 24s18.7 24 32 24h56zm0 96c13.3 0 32-10.7 32-24s-18.7-24-32-24H160c-13.3 0-32 10.7-32 24s18.7 24 32 24h56z'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/vendor/css/fontawesome.min.css">
    <link rel="stylesheet" href="static/css/style.css">
    <script src="static/vendor/js/tailwind.js"></script>
    <script defer src="static/vendor/js/alpine.js"></script>
    <script src="static/vendor/js/dexie.js"></script>
    <script src="static/js/db.js"></script>
    <script src="static/js/resume_viewer.js"></script>
</head>
<body class="bg-gray-100" x-data="{ profileId: new URLSearchParams(window.location.search).get('id') }">
    <!-- Floating action bar - Hidden during print -->
    <nav class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-md border-b shadow-sm z-50 print:hidden px-4 py-2">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex gap-4 items-center">
                <a href="index.html" class="text-blue-600 hover:text-blue-800 font-bold flex items-center">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Dashboard
                </a>
                <a :href="'edit.html?id=' + profileId" class="text-gray-600 hover:text-gray-800 font-semibold flex items-center text-sm border-l pl-4">
                    <i class="fa-solid fa-pen-to-square mr-2"></i> Edit Profile
                </a>
            </div>
            <div class="flex gap-2">
                <button onclick="downloadCurrentProfile()" class="bg-gray-700 hover:bg-gray-800 text-white px-4 py-1.5 rounded-lg text-sm font-bold flex items-center transition-colors shadow-md">
                    <i class="fa-solid fa-download mr-2"></i> Download JSON
                </button>
                <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg text-sm font-bold flex items-center transition-colors shadow-md">
                    <i class="fa-solid fa-print mr-2"></i> Print / Save PDF
                </button>
            </div>
        </div>
    </nav>

    <!-- Content padding for fixed nav -->
    <div class="pt-16 print:pt-0">
        <div class="resume-container" :data-profile-id="profileId">
            <header class="header-clean">
                <h1 id="name"></h1>
                <h2 id="title"></h2>
                <div id="branding" class="branding-text"></div>
                
                <div class="contact-info-clean">
                    <div class="contact-row">
                        <span class="contact-item"><i class="fas fa-envelope"></i> <span id="email"></span></span>
                        <span class="contact-sep">|</span>
                        <span class="contact-item"><i class="fas fa-mobile-alt"></i> <span id="phone"></span></span>
                        <span class="contact-sep">|</span>
                        <span class="contact-item"><i class="fas fa-map-marker-alt"></i> <span id="location">Dubai, UAE</span></span>
                    </div>
                    <div class="contact-row">
                        <span class="contact-item"><i class="fab fa-linkedin"></i> <a href="#" id="linkedin" target="_blank">LinkedIn</a></span>
                        <span class="contact-sep">|</span>
                        <span class="contact-item"><i class="fab fa-github"></i> <a href="#" id="github" target="_blank">GitHub</a></span>
                        <span id="website-container" style="display: none;">
                            <span class="contact-sep">|</span>
                            <span class="contact-item"><i class="fas fa-globe"></i> <a href="#" id="website" target="_blank">Website</a></span>
                        </span>
                    </div>
                </div>
            </header>

            <div class="main-content single-column">
                <section class="section">
                    <h3 class="section-title">PROFESSIONAL SUMMARY</h3>
                    <p id="summary" class="summary-clean"></p>    
                </section>

                <section class="section">
                    <h3 class="section-title">SKILLS</h3>
                    <div id="skills-list" class="skills-container"></div>
                </section>

                <section class="section" id="key-achievements-section" style="display: none;">
                    <h3 class="section-title">KEY ACHIEVEMENTS</h3>
                    <ul id="key-achievements-list" class="job-desc"></ul>
                </section>

                <section class="section" id="project-highlights-section" style="display: none;">
                    <h3 class="section-title">PROJECT HIGHLIGHTS</h3>
                    <ul id="project-highlights-list" class="job-desc"></ul>
                </section>

                <section class="section">
                    <h3 class="section-title">WORK EXPERIENCE</h3>
                    <div id="experience-list"></div>
                </section>

                <section>
                    <h3 class="section-title">EDUCATION</h3>
                    <div id="education-list"></div>
                </section>
            </div>
        </div>
    </div>
    
    <script>
        async function downloadCurrentProfile() {
            const container = document.querySelector('.resume-container');
            const profileId = container ? container.getAttribute('data-profile-id') : null;
            if (profileId) {
                const profile = await getProfile(profileId);
                if (profile) {
                    downloadProfileAsJson(profile);
                }
            }
        }
    </script>
</body>
</html>
