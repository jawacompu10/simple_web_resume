<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Resume{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 384 512' fill='%231e40af'><path d='M64 0C28.7 0 0 28.7 0 64V448c0 35.3 28.7 64 64 64H320c35.3 0 64-28.7 64-64V160H256c-17.7 0-32-14.3-32-32V0H64zM256 0V128H384L256 0zM64 256a32 32 0 1 1 64 0 32 32 0 1 1 -64 0zm152 32c13.3 0 32-10.7 32-24s-18.7-24-32-24H160c-13.3 0-32 10.7-32 24s18.7 24 32 24h56zm0 96c13.3 0 32-10.7 32-24s-18.7-24-32-24H160c-13.3 0-32 10.7-32 24s18.7 24 32 24h56z'/></svg>">
    <!-- Google Fonts for typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='vendor/css/fontawesome.min.css') }}">
    <!-- Tailwind CSS -->
    <script src="{{ url_for('static', path='vendor/js/tailwind.js') }}"></script>
    <!-- Alpine JS -->
    <script defer src="{{ url_for('static', path='vendor/js/alpine.js') }}"></script>
    <!-- HTMX -->
    <script src="{{ url_for('static', path='vendor/js/htmx.js') }}"></script>
    {% block head %}{% endblock %}
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen" hx-boost="true" x-data="{ showContactModal: false }">
    <nav class="bg-blue-800 text-white shadow-md print:hidden">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <a href="/" class="text-xl font-bold flex items-center">
                    <i class="fa-solid fa-file-invoice mr-2"></i>
                    Really Free Resumes
                </a>
                <a href="/" class="hover:text-blue-200 text-sm hidden sm:block">
                    <i class="fa-solid fa-gauge-high mr-1"></i> Dashboard
                </a>
            </div>
            
            <div class="flex items-center space-x-4" id="creator-corner">
                <span class="text-xs font-semibold uppercase tracking-wider text-blue-300 hidden md:block">Creator Corner:</span>
                <a href="https://www.linkedin.com/in/jawahar-vignesh-36418022/" target="_blank" class="hover:text-blue-200 transition-colors" title="LinkedIn">
                    <i class="fa-brands fa-linkedin text-xl"></i>
                </a>
                <a href="https://github.com/jawacompu10/simple-web-resume" target="_blank" class="hover:text-blue-200 transition-colors" title="GitHub Project">
                    <i class="fa-brands fa-github text-xl"></i>
                </a>
                <button @click="showContactModal = true" class="bg-yellow-500 hover:bg-yellow-400 text-blue-900 font-bold py-1 px-4 rounded-full transition-all transform hover:scale-105 text-sm">
                    Hire Me
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    {% include 'partials/contact_modal.html' %}

    <!-- Data & Logic Scripts -->
    <script src="{{ url_for('static', path='vendor/js/dexie.js') }}"></script>
    <script src="{{ url_for('static', path='js/db.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
