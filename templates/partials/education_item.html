<div class="education-item-form bg-gray-50 border border-gray-200 rounded-lg p-4 mb-4 relative" id="education-item-{{ index }}">
    <button type="button" class="absolute top-2 right-2 text-red-500 hover:text-red-700 remove-edu-btn" onclick="removeEducation({{ index }})">
        <i class="fa-solid fa-circle-xmark text-xl"></i>
    </button>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="form-group">
            <label class="block text-sm font-medium text-gray-700">Degree</label>
            <input type="text" name="education[{{ index }}][degree]" placeholder="e.g. Master of Technology" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
        <div class="form-group">
            <label class="block text-sm font-medium text-gray-700">University</label>
            <input type="text" name="education[{{ index }}][university]" placeholder="e.g. BITS, Pilani" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
        <div class="form-group md:col-span-2">
            <label class="block text-sm font-medium text-gray-700">Years</label>
            <input type="text" name="education[{{ index }}][years]" placeholder="e.g. 2010 - 2014" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
    </div>
</div>
