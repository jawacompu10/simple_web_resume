<form id="edit-profile-form">
    <!-- Personal Info -->
    <section>
        <h3 class="text-xl font-semibold mb-4 text-blue-800">Personal Info</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="form-group">
                <label for="form-name" class="block text-sm font-medium text-gray-700">Name</label>
                <input type="text" id="form-name" name="personalInfo[name]" x-model="profile.personalInfo.name" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            <div class="form-group">
                <label for="form-title" class="block text-sm font-medium text-gray-700">Title</label>
                <input type="text" id="form-title" name="personalInfo[title]" x-model="profile.personalInfo.title" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            <div class="form-group md:col-span-2">
                <label for="form-branding" class="block text-sm font-medium text-gray-700">Branding</label>
                <input type="text" id="form-branding" name="personalInfo[branding]" x-model="profile.personalInfo.branding" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            <div class="form-group">
                <label for="form-email" class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="form-email" name="personalInfo[email]" x-model="profile.personalInfo.email" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            <div class="form-group">
                <label for="form-phone" class="block text-sm font-medium text-gray-700">Phone</label>
                <input type="text" id="form-phone" name="personalInfo[phone]" x-model="profile.personalInfo.phone" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            <div class="form-group">
                <label for="form-linkedin" class="block text-sm font-medium text-gray-700">LinkedIn URL</label>
                <input type="url" id="form-linkedin" name="personalInfo[linkedin]" x-model="profile.personalInfo.linkedin" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            <div class="form-group">
                <label for="form-github" class="block text-sm font-medium text-gray-700">GitHub URL</label>
                <input type="url" id="form-github" name="personalInfo[github]" x-model="profile.personalInfo.github" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            <div class="form-group">
                <label for="form-website" class="block text-sm font-medium text-gray-700">Website URL (Optional)</label>
                <input type="url" id="form-website" name="personalInfo[website]" x-model="profile.personalInfo.website" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
            <div class="form-group md:col-span-2">
                <label for="form-currentLocation" class="block text-sm font-medium text-gray-700">Location</label>
                <input type="text" id="form-currentLocation" name="personalInfo[currentLocation]" x-model="profile.personalInfo.currentLocation" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>
        </div>
    </section>

    <!-- Summary -->
    <section class="mt-8">
        <h3 class="text-xl font-semibold mb-4 text-blue-800">Summary</h3>
        <label for="form-summary" class="sr-only">Summary</label>
        <textarea id="form-summary" name="summary" x-model="profile.summary" rows="4" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm"></textarea>
    </section>

    <!-- Key Achievements -->
    <section class="mt-8">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-xl font-semibold text-blue-800">Key Achievements</h3>
            <span class="text-xs text-gray-500 uppercase font-bold tracking-wider">One per line</span>
        </div>
        <label for="form-keyAchievements" class="sr-only">Key Achievements</label>
        <textarea id="form-keyAchievements" name="keyAchievements"
                  x-init="$el.value = Array.isArray(profile.keyAchievements) ? profile.keyAchievements.join('\n') : ''"
                  @input="profile.keyAchievements = $event.target.value.split('\n').filter(line => line.trim() !== '')"
                  rows="4" placeholder="Won Employee of the Month..." 
                  class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm"></textarea>
    </section>

    <!-- Project Highlights -->
    <section class="mt-8">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-xl font-semibold text-blue-800">Project Highlights</h3>
            <span class="text-xs text-gray-500 uppercase font-bold tracking-wider">One per line</span>
        </div>
        <label for="form-projectHighlights" class="sr-only">Project Highlights</label>
        <textarea id="form-projectHighlights" name="projectHighlights"
                  x-init="$el.value = Array.isArray(profile.projectHighlights) ? profile.projectHighlights.join('\n') : ''"
                  @input="profile.projectHighlights = $event.target.value.split('\n').filter(line => line.trim() !== '')"
                  rows="4" placeholder="Migration to Playwright..." 
                  class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm"></textarea>
    </section>

    <!-- Skills -->
    <section id="skills-section" class="mt-8">
        <h3 class="text-xl font-semibold mb-4 text-blue-800">Skills</h3>
        <div id="skill-categories-container">
            <template x-for="(cat, index) in skillCategories" :key="index">
                <div class="skill-category-form bg-gray-50 border border-gray-200 rounded-lg p-4 mb-4 relative">
                    <button type="button" @click="removeSkillCategory(index)" class="absolute top-2 right-2 text-red-500 hover:text-red-700 remove-skill-btn">
                        <i class="fa-solid fa-circle-xmark text-xl"></i>
                    </button>
                    <div class="space-y-4">
                        <div class="form-group">
                            <label class="block text-sm font-medium text-gray-700">Category Name</label>
                            <input type="text" :name="'skills[' + index + '][name]'" x-model="cat.name" placeholder="e.g. Frontend" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                        <div class="form-group">
                            <label class="block text-sm font-medium text-gray-700">Skills (One per line)</label>
                            <textarea :name="'skills[' + index + '][items]'" x-model="cat.items" placeholder="React&#10;Tailwind" rows="3" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm"></textarea>
                        </div>
                    </div>
                </div>
            </template>
        </div>
        <button type="button" @click="addSkillCategory()" class="w-full py-2 border-2 border-dashed border-gray-300 rounded-lg text-gray-500 hover:text-blue-600 hover:border-blue-400 transition-colors">
            <i class="fa-solid fa-plus mr-2"></i> Add Skill Category
        </button>
    </section>

    <!-- Work Experience -->
    <section id="experience-section" class="mt-8">
        <h3 class="text-xl font-semibold mb-4 text-blue-800">Work Experience</h3>
        <div id="experience-items-container">
            <template x-for="(exp, index) in profile.experience" :key="index">
                <div class="experience-item-form bg-gray-50 border border-gray-200 rounded-lg p-4 mb-4 relative">
                    <button type="button" @click="removeExperience(index)" class="absolute top-2 right-2 text-red-500 hover:text-red-700 remove-exp-btn">
                        <i class="fa-solid fa-circle-xmark text-xl"></i>
                    </button>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="form-group">
                            <input type="text" :name="'experience[' + index + '][title]'" x-model="exp.title" placeholder="Job Title" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                        <div class="form-group">
                            <input type="text" :name="'experience[' + index + '][company]'" x-model="exp.company" placeholder="Company" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                        <div class="form-group md:col-span-2">
                            <input type="text" :name="'experience[' + index + '][years]'" x-model="exp.years" placeholder="Years (e.g., 2020 - 2022)" class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                        <div class="form-group md:col-span-2">
                            <textarea :name="'experience[' + index + '][description]'" 
                                      placeholder="Description (one point per line)" rows="3" 
                                      class="block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                                      x-init="$el.value = Array.isArray(exp.description) ? exp.description.join('\n') : ''"
                                      @input="exp.description = $event.target.value.split('\n').filter(line => line.trim() !== '')"></textarea>
                        </div>
                    </div>
                </div>
            </template>
        </div>
        <button type="button" @click="addExperience()" class="w-full py-2 border-2 border-dashed border-gray-300 rounded-lg text-gray-500 hover:text-blue-600 hover:border-blue-400 transition-colors">
            <i class="fa-solid fa-plus mr-2"></i> Add Experience
        </button>
    </section>

    <!-- Education -->
    <section id="education-section" class="mt-8">
        <h3 class="text-xl font-semibold mb-4 text-blue-800">Education</h3>
        <div id="education-items-container">
            <template x-for="(edu, index) in profile.education" :key="index">
                <div class="education-item-form bg-gray-50 border border-gray-200 rounded-lg p-4 mb-4 relative">
                    <button type="button" @click="removeEducation(index)" class="absolute top-2 right-2 text-red-500 hover:text-red-700 remove-edu-btn">
                        <i class="fa-solid fa-circle-xmark text-xl"></i>
                    </button>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="form-group">
                            <label class="block text-sm font-medium text-gray-700">Degree</label>
                            <input type="text" :name="'education[' + index + '][degree]'" x-model="edu.degree" placeholder="e.g. Master of Science" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                        <div class="form-group">
                            <label class="block text-sm font-medium text-gray-700">University</label>
                            <input type="text" :name="'education[' + index + '][university]'" x-model="edu.university" placeholder="e.g. BITS, Pilani" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                        <div class="form-group md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">Years</label>
                            <input type="text" :name="'education[' + index + '][years]'" x-model="edu.years" placeholder="e.g. 2010 - 2014" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                    </div>
                </div>
            </template>
        </div>
        <button type="button" @click="addEducation()" class="w-full py-2 border-2 border-dashed border-gray-300 rounded-lg text-gray-500 hover:text-blue-600 hover:border-blue-400 transition-colors">
            <i class="fa-solid fa-plus mr-2"></i> Add Education
        </button>
    </section>

    <div class="mt-10 pt-6 border-t flex justify-end space-x-4">
        <a href="/" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors">Cancel</a>
        <button type="button" @click="saveAndExit()" class="px-6 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-colors shadow-md save-profile-btn">
            Save Profile
        </button>
    </div>
</form>
